<!DOCTYPE html>
<html>

<head>
<title>Formal Intelligence</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.chat{
width:400px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

#chatbox{
height:300px;
overflow-y:auto;
background:#020617;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.user{
background:#2563eb;
padding:8px;
margin:5px;
border-radius:6px;
text-align:right;
}

.bot{
background:#334155;
padding:8px;
margin:5px;
border-radius:6px;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px;
background:#22c55e;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>


<body>

<div class="chat">

<h2>Formal Intelligence</h2>

<div id="chatbox"></div>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>

</div>

<script>

function send(){

let msg=document.getElementById("msg").value;

if(msg==="") return;

let chat=document.getElementById("chatbox");

chat.innerHTML += "<div class='user'>"+msg+"</div>";

let reply="I am still learning.";

let text=msg.toLowerCase();

if(text.includes("hello")){
reply="Hello! Nice to meet you.";
}

else if(text.includes("ai")){
reply="AI means Artificial Intelligence.";
}

else if(text.includes("game")){
reply="Games are fun 🎮";
}

else if(text.includes("who are you")){
reply="I am Formal Intelligence chatbot.";
}

setTimeout(function(){
chat.innerHTML += "<div class='bot'>"+reply+"</div>";
chat.scrollTop=chat.scrollHeight;
},500);

document.getElementById("msg").value="";

}

</script>

</body>

</html>
